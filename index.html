<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIVY Hotels PMS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .logo span { color: #38bdf8; }
    .badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 9999px;
      padding: 0.4rem 1.2rem;
      font-size: 0.8rem;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">AIVY <span>Hotels</span></div>
  <div class="badge">Property Management System</div>
  <h1>Coming soon</h1>
</body>
</html>
